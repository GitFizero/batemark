<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="30%" stop-color="#111b33"/>
      <stop offset="60%" stop-color="#1a2844"/>
      <stop offset="85%" stop-color="#2d3a52"/>
      <stop offset="100%" stop-color="#4a3a2e"/>
    </linearGradient>
    <linearGradient id="horizonGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="85%" stop-color="#c47a3a" stop-opacity="0.15"/>
      <stop offset="95%" stop-color="#e8935a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c47a3a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="windowFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1e"/>
      <stop offset="50%" stop-color="#5a4030"/>
      <stop offset="100%" stop-color="#3a2a1e"/>
    </linearGradient>
    <linearGradient id="wallPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="50%" stop-color="#2a2018"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="lampGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f0a050" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f0a050" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lampLight1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffc878" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#f0a050" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0a050" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampLight2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffc878" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#f0a050" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0a050" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGlowT" cx="50%" cy="25%" r="20%">
      <stop offset="0%" stop-color="#d4e4f0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#111b33" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="windowClip">
      <rect x="340" y="120" width="1240" height="680" rx="50"/>
    </clipPath>
  </defs>

  <!-- Interior walls -->
  <rect width="1920" height="1080" fill="#0f0c08"/>

  <!-- Left wall panel -->
  <rect x="0" y="0" width="340" height="1080" fill="url(#wallPanel)"/>
  <!-- Right wall panel -->
  <rect x="1580" y="0" width="340" height="1080" fill="url(#wallPanel)"/>

  <!-- Window frame outer -->
  <rect x="310" y="90" width="1300" height="740" rx="60" fill="url(#windowFrame)"/>

  <!-- Window glass area -->
  <g clip-path="url(#windowClip)">
    <!-- Night sky through window -->
    <rect x="340" y="120" width="1240" height="680" fill="url(#nightSky)"/>

    <!-- Horizon glow -->
    <rect x="340" y="120" width="1240" height="680" fill="url(#horizonGlow)"/>

    <!-- Moon through window -->
    <circle cx="960" cy="240" r="28" fill="#d4e4f0" opacity="0.85" filter="url(#softGlow)"/>
    <rect x="340" y="120" width="1240" height="680" fill="url(#moonGlowT)"/>

    <!-- Stars -->
    <circle cx="500" cy="200" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="700" cy="160" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="1100" cy="180" r="1.5" fill="#fff" opacity="0.5"/>
    <circle cx="1300" cy="220" r="1" fill="#fff" opacity="0.35"/>
    <circle cx="850" cy="250" r="1.2" fill="#fff" opacity="0.3"/>
    <circle cx="600" cy="300" r="1" fill="#fff" opacity="0.25"/>
    <circle cx="1200" cy="280" r="1.3" fill="#fff" opacity="0.4"/>
    <circle cx="450" cy="350" r="1" fill="#fff" opacity="0.2"/>
    <circle cx="1400" cy="170" r="1" fill="#fff" opacity="0.45"/>

    <!-- Distant tree silhouettes -->
    <path d="M340 560 Q400 540 440 550 Q460 530 480 545 Q520 520 560 540 Q580 525 620 535 Q660 510 700 530 Q740 520 780 540 Q820 525 860 535 Q900 515 940 530 Q980 525 1020 540 Q1060 520 1100 535 Q1140 510 1180 530 Q1220 520 1260 540 Q1300 525 1340 535 Q1380 520 1420 540 Q1460 530 1500 545 Q1540 520 1580 540 L1580 620 L340 620Z" fill="#1a2030" opacity="0.8"/>

    <!-- Fields -->
    <rect x="340" y="580" width="1240" height="220" fill="#1a2030" opacity="0.6"/>

    <!-- Subtle landscape lines -->
    <path d="M340 600 Q580 590 820 605 Q1060 620 1300 595 Q1440 585 1580 600" fill="none" stroke="#2a3548" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Window frame inner edge highlight -->
  <rect x="340" y="120" width="1240" height="680" rx="50" fill="none" stroke="#6a5040" stroke-width="3" opacity="0.4"/>

  <!-- Table/ledge -->
  <rect x="400" y="800" width="1120" height="15" rx="4" fill="#2a3a4a" opacity="0.7"/>
  <rect x="400" y="815" width="1120" height="80" rx="0" fill="#1a2530" opacity="0.5"/>

  <!-- Left lamp -->
  <circle cx="240" cy="320" r="35" fill="url(#lampLight1)"/>
  <circle cx="240" cy="320" r="12" fill="#ffc878" opacity="0.9"/>
  <ellipse cx="240" cy="500" rx="60" ry="180" fill="#f0a050" opacity="0.03"/>

  <!-- Right lamp -->
  <circle cx="1680" cy="320" r="35" fill="url(#lampLight2)"/>
  <circle cx="1680" cy="320" r="12" fill="#ffc878" opacity="0.9"/>
  <ellipse cx="1680" cy="500" rx="60" ry="180" fill="#f0a050" opacity="0.03"/>

  <!-- Warm ambient light from lamps on walls -->
  <rect x="0" y="0" width="340" height="1080" fill="#f0a050" opacity="0.03"/>
  <rect x="1580" y="0" width="340" height="1080" fill="#f0a050" opacity="0.03"/>

  <!-- Seats hint (bottom) -->
  <path d="M100 900 Q100 850 180 850 L300 850 Q340 850 340 900 L340 1080 L100 1080Z" fill="#1a2844" opacity="0.5"/>
  <path d="M1580 900 Q1580 850 1640 850 L1780 850 Q1820 850 1820 900 L1820 1080 L1580 1080Z" fill="#1a2844" opacity="0.5"/>
</svg>