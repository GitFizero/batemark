<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="40%" stop-color="#0f2847"/>
      <stop offset="70%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#1e4d6e"/>
    </linearGradient>
    <linearGradient id="ocean1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#0a2a3f"/>
    </linearGradient>
    <linearGradient id="ocean2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#154360"/>
      <stop offset="100%" stop-color="#071e2e"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="75%" cy="20%" r="15%">
      <stop offset="0%" stop-color="#c9d6e3" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7ea8c9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Moon glow -->
  <rect width="1920" height="1080" fill="url(#moonGlow)"/>

  <!-- Moon -->
  <circle cx="1440" cy="200" r="35" fill="#d4e4f0" opacity="0.9" filter="url(#glow)"/>

  <!-- Stars -->
  <circle cx="200" cy="80" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="500" cy="120" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="800" cy="60" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="1100" cy="150" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="1600" cy="90" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="350" cy="200" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="950" cy="180" r="1.2" fill="#ffffff" opacity="0.4"/>
  <circle cx="1300" cy="100" r="1" fill="#ffffff" opacity="0.35"/>
  <circle cx="1700" cy="250" r="1.3" fill="#ffffff" opacity="0.3"/>
  <circle cx="650" cy="230" r="1" fill="#ffffff" opacity="0.25"/>

  <!-- Moon reflection on water -->
  <ellipse cx="1440" cy="620" rx="80" ry="200" fill="#c9d6e3" opacity="0.04"/>
  <ellipse cx="1440" cy="620" rx="30" ry="150" fill="#c9d6e3" opacity="0.06"/>

  <!-- Far wave layer -->
  <path d="M0 500 Q240 460 480 490 Q720 520 960 480 Q1200 440 1440 470 Q1680 500 1920 475 L1920 1080 L0 1080Z" fill="url(#ocean1)" opacity="0.7"/>

  <!-- Main wave - the big one -->
  <path d="M0 580 Q160 520 320 540 Q480 560 640 530 Q800 500 960 550 Q1120 600 1280 560 Q1440 520 1600 555 Q1760 590 1920 560 L1920 1080 L0 1080Z" fill="url(#ocean1)"/>

  <!-- Wave crest foam -->
  <path d="M0 578 Q160 518 320 538 Q480 558 640 528 Q800 498 960 548 Q1120 598 1280 558 Q1440 518 1600 553 Q1760 588 1920 558" fill="none" stroke="url(#foam)" stroke-width="4"/>

  <!-- Mid wave -->
  <path d="M0 650 Q240 620 480 640 Q720 660 960 635 Q1200 610 1440 645 Q1680 680 1920 650 L1920 1080 L0 1080Z" fill="url(#ocean2)"/>

  <!-- Small ripple foam -->
  <path d="M0 648 Q240 618 480 638 Q720 658 960 633 Q1200 608 1440 643 Q1680 678 1920 648" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.08"/>

  <!-- Near wave -->
  <path d="M0 750 Q320 720 640 740 Q960 760 1280 735 Q1600 710 1920 740 L1920 1080 L0 1080Z" fill="#071e2e"/>

  <!-- Closest wave -->
  <path d="M0 850 Q480 830 960 850 Q1440 870 1920 845 L1920 1080 L0 1080Z" fill="#051622"/>

  <!-- Subtle depth -->
  <rect y="900" width="1920" height="180" fill="#030f18"/>
</svg>